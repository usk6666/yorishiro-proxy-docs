      - First capture: getting-started/first-capture.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Flows: concepts/flows.md
      - MCP-first design: concepts/mcp-first-design.md
      - Security model: concepts/security-model.md
  - MCP tools:
      - Overview: tools/overview.md
      - proxy_start: tools/proxy-start.md
      - proxy_stop: tools/proxy-stop.md
      - configure: tools/configure.md
      - query: tools/query.md
      - resend: tools/resend.md
      - fuzz: tools/fuzz.md
      - macro: tools/macro.md
      - intercept: tools/intercept.md
      - manage: tools/manage.md
      - security: tools/security.md
      - plugin: tools/plugin.md
  - Features:
      - Resender: features/resender.md
      - Fuzzer: features/fuzzer.md
      - Macros: features/macros.md
      - Intercept: features/intercept.md
      - Auto-transform: features/auto-transform.md
      - Target scope: features/target-scope.md
      - SafetyFilter: features/safety-filter.md
      - Rate limits & budgets: features/rate-limits.md
      - Flow export & import: features/flow-export-import.md
